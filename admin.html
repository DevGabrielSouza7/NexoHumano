<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Nexo Psicologia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-beige: #efebe4; --primary-green: #0b4522; --active-green: #14733b; --text-dark: #2c302e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-beige); color: var(--text-dark); height: 100vh; overflow: hidden; }
        
        /* TELA DE LOGIN */
        .login-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        
        /* DASHBOARD LAYOUT */
        .admin-container { display: none; height: 100vh; flex-direction: row; }
        
        /* Menu Lateral */
        .sidebar { width: 280px; background-color: var(--primary-green); color: white; display: flex; flex-direction: column; padding-top: 30px; box-shadow: 4px 0 10px rgba(0,0,0,0.1); z-index: 10; }
        .sidebar h2 { color: white; text-align: center; font-size: 1.5rem; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu-btn { background: none; border: none; color: #ddd; width: 100%; text-align: left; padding: 18px 25px; font-size: 1.05rem; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; }
        .menu-btn:hover { background-color: rgba(255,255,255,0.1); color: white; }
        .menu-btn.active { background-color: var(--active-green); color: white; border-left: 4px solid white; font-weight: 500; }
        
        /* Área Principal */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; background-color: #f8f9fa; position: relative; }
        .content-section { display: none; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.04); margin-bottom: 30px; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h3.section-title { margin-top: 0; color: var(--primary-green); border-bottom: 2px solid var(--bg-beige); padding-bottom: 10px; margin-bottom: 25px; font-size: 1.5rem; }
        
        /* Inputs e Forms */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.95rem; color: #555; }
        input[type="password"], input[type="text"], textarea, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; outline: none; font-size: 1rem; transition: border-color 0.3s; }
        input[type="file"] { background: #f9f9f9; padding: 12px; border: 2px dashed #ddd; width: 100%; border-radius: 6px; cursor: pointer; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary-green); }
        textarea { resize: vertical; }
        
        .preview-img { max-width: 150px; max-height: 150px; margin-top: 15px; border-radius: 8px; display: block; border: 1px solid #ddd; object-fit: cover; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        
        /* Botões */
        .btn { background-color: var(--primary-green); color: white; padding: 15px 25px; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; transition: opacity 0.3s, transform 0.1s; }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn-salvar-tudo { position: sticky; bottom: 0; margin-top: 20px; box-shadow: 0 -10px 20px rgba(248, 249, 250, 0.9); padding: 20px 0; background: #f8f9fa; z-index: 100; }
        
        .status-msg { margin-top: 15px; font-size: 0.95rem; font-weight: 500; text-align: center; }
        .style-box { background: #f1efe9; padding: 25px; border-radius: 10px; margin-top: 30px; border: 1px solid #e2ddd1; }
        .style-box h4 { margin-bottom: 20px; color: var(--primary-green); font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div class="login-wrapper" id="loginWrapper">
        <div class="login-card">
            <h2 style="color:var(--primary-green); margin-bottom:20px;">Acesso Restrito</h2>
            <div class="form-group"><input type="password" id="senhaAdmin" placeholder="Digite a senha do sistema..."></div>
            <button class="btn" onclick="verificarSenha()">Entrar no Painel</button>
            <div id="loginErro" class="status-msg" style="color: red;"></div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="admin-container" id="adminContainer">
        
        <!-- MENU LATERAL -->
        <aside class="sidebar">
            <h2 style="border:none;">Painel Nexo</h2>
            <button class="menu-btn active" onclick="mudarAba('sec-hero', this)">🏠 Seção Inicial</button>
            <button class="menu-btn" onclick="mudarAba('sec-terapia', this)">🛋️ Terapia</button>
            <button class="menu-btn" onclick="mudarAba('sec-equipe', this)">👥 Equipe</button>
            <button class="menu-btn" onclick="mudarAba('sec-modalidades', this)">💻 Modalidades</button>
        </aside>

        <!-- ÁREA DE CONTEÚDO -->
        <main class="main-content">
            <form id="adminForm" onsubmit="salvarAlteracoes(event)">
                
                <!-- ABA: HERO -->
                <div id="sec-hero" class="content-section active">
                    <h3 class="section-title">Seção Inicial (Hero)</h3>
                    <div class="form-group">
                        <label>Título Principal</label>
                        <input type="text" id="hero_titulo" required>
                    </div>
                    <div class="form-group">
                        <label>Imagem Principal da Hero</label>
                        <input type="file" id="hero_imagem" accept="image/*" onchange="mostrarPreview(this, 'previewHero')">
                        <input type="hidden" id="hero_imagem_url_atual">
                        <img id="previewHero" class="preview-img" src="">
                    </div>
                    
                    <!-- Estilo Hero -->
                    <div class="style-box">
                        <h4>🎨 Ajuste Visual: Imagem Inicial (Hero)</h4>
                        <div class="image-grid">
                            <div class="form-group"><label>Largura (ex: 100%, 400px):</label><input type="text" id="hero_imagem-width" placeholder="Ex: 100%"></div>
                            <div class="form-group"><label>Altura (ex: 500px, auto):</label><input type="text" id="hero_imagem-height" placeholder="Ex: auto"></div>
                        </div>
                        <div class="image-grid">
                            <div class="form-group">
                                <label>Encaixe:</label>
                                <select id="hero_imagem-fit">
                                    <option value="cover">Preencher e Cortar (Cover)</option>
                                    <option value="contain">Mostrar Inteira (Contain)</option>
                                    <option value="fill">Esticar (Fill)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Posição do Corte:</label>
                                <select id="hero_imagem-position">
                                    <option value="center">Centralizado</option>
                                    <option value="top">Focar no Topo</option>
                                    <option value="bottom">Focar na Base</option>
                                    <option value="left">Alinhar à Esquerda</option>
                                    <option value="right">Alinhar à Direita</option>
                                </select>
                            </div>
                        </div>
                        <button type="button" class="btn" style="background-color: #1a1c1a; margin-top: 10px;" onclick="salvarEstilos(event, 'hero', 'hero_imagem')">Salvar Tamanho e Posição</button>
                    </div>
                </div>

                <!-- ABA: TERAPIA -->
                <div id="sec-terapia" class="content-section">
                    <h3 class="section-title">Seção Terapia</h3>
                    <div class="form-group">
                        <label>Título da Seção</label>
                        <input type="text" id="terapia_titulo" required>
                    </div>
                    <div class="form-group">
                        <label>Texto Explicativo</label>
                        <textarea id="terapia_texto" rows="5" required></textarea>
                    </div>
                </div>

                <!-- ABA: EQUIPE -->
                <div id="sec-equipe" class="content-section">
                    <h3 class="section-title">Nossa Equipe</h3>
                    <div class="image-grid">
                        <div class="form-group">
                            <label>Foto Psicólogo 1</label>
                            <input type="file" id="equipe_foto1" accept="image/*" onchange="mostrarPreview(this, 'previewEquipe1')">
                            <input type="hidden" id="equipe_foto1_url_atual">
                            <img id="previewEquipe1" class="preview-img" src="">
                        </div>
                        <div class="form-group">
                            <label>Foto Psicólogo 2</label>
                            <input type="file" id="equipe_foto2" accept="image/*" onchange="mostrarPreview(this, 'previewEquipe2')">
                            <input type="hidden" id="equipe_foto2_url_atual">
                            <img id="previewEquipe2" class="preview-img" src="">
                        </div>
                        <div class="form-group">
                            <label>Foto Psicólogo 3</label>
                            <input type="file" id="equipe_foto3" accept="image/*" onchange="mostrarPreview(this, 'previewEquipe3')">
                            <input type="hidden" id="equipe_foto3_url_atual">
                            <img id="previewEquipe3" class="preview-img" src="">
                        </div>
                    </div>

                    <!-- Estilos Equipe -->
                    <div class="style-box">
                        <h4>🎨 Ajuste Visual: Padrão das Fotos da Equipe</h4>
                        <div class="image-grid">
                            <div class="form-group"><label>Largura (ex: 100%, 250px):</label><input type="text" id="equipe_foto_1-width" placeholder="Ex: 100%"></div>
                            <div class="form-group"><label>Altura (ex: 300px, auto):</label><input type="text" id="equipe_foto_1-height" placeholder="Ex: 300px"></div>
                        </div>
                        <div class="image-grid">
                            <div class="form-group">
                                <label>Encaixe:</label>
                                <select id="equipe_foto_1-fit">
                                    <option value="cover">Preencher e Cortar (Cover)</option>
                                    <option value="contain">Mostrar Inteira (Contain)</option>
                                    <option value="fill">Esticar (Fill)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Posição do Corte:</label>
                                <select id="equipe_foto_1-position">
                                    <option value="center">Centralizado</option>
                                    <option value="top">Focar no Topo</option>
                                    <option value="bottom">Focar na Base</option>
                                    <option value="left">Alinhar à Esquerda</option>
                                    <option value="right">Alinhar à Direita</option>
                                </select>
                            </div>
                        </div>
                        <button type="button" class="btn" style="background-color: #1a1c1a; margin-top: 10px;" onclick="salvarEstilos(event, 'equipe', 'equipe_foto_1')">Salvar Tamanho e Posição</button>
                    </div>
                </div>

                <!-- ABA: MODALIDADES -->
                <div id="sec-modalidades" class="content-section">
                    <h3 class="section-title">Modalidades de Atendimento</h3>
                    <div class="image-grid">
                        <div class="form-group">
                            <label>Imagem Atendimento Online</label>
                            <input type="file" id="modalidade_online" accept="image/*" onchange="mostrarPreview(this, 'previewModOnline')">
                            <input type="hidden" id="modalidade_online_url_atual">
                            <img id="previewModOnline" class="preview-img" src="">
                        </div>
                        <div class="form-group">
                            <label>Imagem Consultório Presencial</label>
                            <input type="file" id="modalidade_presencial" accept="image/*" onchange="mostrarPreview(this, 'previewModPresencial')">
                            <input type="hidden" id="modalidade_presencial_url_atual">
                            <img id="previewModPresencial" class="preview-img" src="">
                        </div>
                    </div>
                    
                    <!-- Estilos Modalidades -->
                    <div class="style-box">
                        <h4>🎨 Ajuste Visual: Padrão das Modalidades</h4>
                        <div class="image-grid">
                            <div class="form-group"><label>Largura:</label><input type="text" id="modalidades_foto-width" placeholder="Ex: 100%"></div>
                            <div class="form-group"><label>Altura:</label><input type="text" id="modalidades_foto-height" placeholder="Ex: 250px"></div>
                        </div>
                        <div class="image-grid">
                            <div class="form-group">
                                <label>Encaixe:</label>
                                <select id="modalidades_foto-fit">
                                    <option value="cover">Preencher e Cortar (Cover)</option>
                                    <option value="contain">Mostrar Inteira (Contain)</option>
                                    <option value="fill">Esticar (Fill)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Posição do Corte:</label>
                                <select id="modalidades_foto-position">
                                    <option value="center">Centralizado</option>
                                    <option value="top">Focar no Topo</option>
                                    <option value="bottom">Focar na Base</option>
                                    <option value="left">Alinhar à Esquerda</option>
                                    <option value="right">Alinhar à Direita</option>
                                </select>
                            </div>
                        </div>
                        <button type="button" class="btn" style="background-color: #1a1c1a; margin-top: 10px;" onclick="salvarEstilos(event, 'modalidades', 'modalidades_foto')">Salvar Tamanho e Posição</button>
                    </div>
                </div>

                <!-- BOTÃO DE SALVAR GERAL -->
                <div class="btn-salvar-tudo">
                    <button type="submit" class="btn" id="btnSalvar">💾 Salvar Alterações do Conteúdo (Textos/Fotos)</button>
                    <div id="statusSalvar" class="status-msg"></div>
                </div>
                
            </form>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://aywlhxvljukjsmcspplc.supabase.co'; 
        const supabaseKey = 'sb_publishable_EEuGEXGAAMSTKXS94LTihA_Q9QWrDaT';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        const SENHA_CORRETA = 'Pai7nel@07';

        function mudarAba(idSecao, botaoClicado) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(idSecao).classList.add('active');
            botaoClicado.classList.add('active');
        }

        function verificarSenha() {
            if (document.getElementById('senhaAdmin').value === SENHA_CORRETA) {
                document.getElementById('loginWrapper').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'flex';
                buscarDadosAtuais();
            } else {
                document.getElementById('loginErro').innerText = "Senha incorreta!";
            }
        }

        function mostrarPreview(input, idPreview) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { document.getElementById(idPreview).src = e.target.result; }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function fazerUploadImagem(inputId, hiddenId, prefixoNome) {
            const fileInput = document.getElementById(inputId);
            let urlFinal = document.getElementById(hiddenId).value;
            if (fileInput.files && fileInput.files[0]) {
                const file = fileInput.files[0];
                const fileName = `${prefixoNome}_${Date.now()}.${file.name.split('.').pop()}`;
                const { error: uploadError } = await supabaseClient.storage.from('imagens-clinica').upload(fileName, file);
                if (uploadError) throw uploadError;
                urlFinal = supabaseClient.storage.from('imagens-clinica').getPublicUrl(fileName).data.publicUrl;
            }
            return urlFinal;
        }

        async function buscarDadosAtuais() {
            try {
                const { data, error } = await supabaseClient.from('conteudo_site').select('*');
                if (error) throw error;
               
                data.forEach(item => {
                    // Preencher Textos e Imagens
                    if (item.secao === 'hero' && item.chave === 'titulo') document.getElementById('hero_titulo').value = item.valor;
                    if (item.secao === 'terapia' && item.chave === 'titulo') document.getElementById('terapia_titulo').value = item.valor;
                    if (item.secao === 'terapia' && item.chave === 'texto') document.getElementById('terapia_texto').value = item.valor;
                    
                    if (item.secao === 'hero' && item.chave === 'imagem') { document.getElementById('hero_imagem_url_atual').value = item.valor; document.getElementById('previewHero').src = item.valor; }
                    if (item.secao === 'equipe' && item.chave === 'foto_1') { document.getElementById('equipe_foto1_url_atual').value = item.valor; document.getElementById('previewEquipe1').src = item.valor; }
                    if (item.secao === 'equipe' && item.chave === 'foto_2') { document.getElementById('equipe_foto2_url_atual').value = item.valor; document.getElementById('previewEquipe2').src = item.valor; }
                    if (item.secao === 'equipe' && item.chave === 'foto_3') { document.getElementById('equipe_foto3_url_atual').value = item.valor; document.getElementById('previewEquipe3').src = item.valor; }
                    if (item.secao === 'modalidades' && item.chave === 'foto_online') { document.getElementById('modalidade_online_url_atual').value = item.valor; document.getElementById('previewModOnline').src = item.valor; }
                    if (item.secao === 'modalidades' && item.chave === 'foto_presencial') { document.getElementById('modalidade_presencial_url_atual').value = item.valor; document.getElementById('previewModPresencial').src = item.valor; }
                
                    // Preencher Estilos Salvos
                    if (item.chave.includes('_width')) { const el = document.getElementById(item.chave.replace('_width', '-width')); if(el) el.value = item.valor; }
                    if (item.chave.includes('_height')) { const el = document.getElementById(item.chave.replace('_height', '-height')); if(el) el.value = item.valor; }
                    if (item.chave.includes('_fit')) { const el = document.getElementById(item.chave.replace('_fit', '-fit')); if(el) el.value = item.valor; }
                    if (item.chave.includes('_position')) { const el = document.getElementById(item.chave.replace('_position', '-position')); if(el) el.value = item.valor; }
                });
            } catch (error) { console.error("Erro ao ler dados."); }
        }

        async function salvarAlteracoes(event) {
            event.preventDefault();
            const btn = document.getElementById('btnSalvar'); const status = document.getElementById('statusSalvar');
            btn.disabled = true; status.style.color = "#0b4522"; status.innerText = "Sincronizando com o banco...";

            try {
                const urlHero = await fazerUploadImagem('hero_imagem', 'hero_imagem_url_atual', 'hero');
                const urlEquipe1 = await fazerUploadImagem('equipe_foto1', 'equipe_foto1_url_atual', 'eq1');
                const urlEquipe2 = await fazerUploadImagem('equipe_foto2', 'equipe_foto2_url_atual', 'eq2');
                const urlEquipe3 = await fazerUploadImagem('equipe_foto3', 'equipe_foto3_url_atual', 'eq3');
                const urlModOnline = await fazerUploadImagem('modalidade_online', 'modalidade_online_url_atual', 'mod_on');
                const urlModPresencial = await fazerUploadImagem('modalidade_presencial', 'modalidade_presencial_url_atual', 'mod_pre');

                const novosDados = [
                    { secao: 'hero', chave: 'titulo', valor: document.getElementById('hero_titulo').value },
                    { secao: 'terapia', chave: 'titulo', valor: document.getElementById('terapia_titulo').value },
                    { secao: 'terapia', chave: 'texto', valor: document.getElementById('terapia_texto').value },
                    { secao: 'hero', chave: 'imagem', valor: urlHero },
                    { secao: 'equipe', chave: 'foto_1', valor: urlEquipe1 },
                    { secao: 'equipe', chave: 'foto_2', valor: urlEquipe2 },
                    { secao: 'equipe', chave: 'foto_3', valor: urlEquipe3 },
                    { secao: 'modalidades', chave: 'foto_online', valor: urlModOnline },
                    { secao: 'modalidades', chave: 'foto_presencial', valor: urlModPresencial }
                ];

                for (const item of novosDados) {
                    await supabaseClient.from('conteudo_site').update({ valor: item.valor }).eq('secao', item.secao).eq('chave', item.chave);
                }

                document.getElementById('hero_imagem_url_atual').value = urlHero;
                document.getElementById('equipe_foto1_url_atual').value = urlEquipe1;
                document.getElementById('equipe_foto2_url_atual').value = urlEquipe2;
                document.getElementById('equipe_foto3_url_atual').value = urlEquipe3;
                document.getElementById('modalidade_online_url_atual').value = urlModOnline;
                document.getElementById('modalidade_presencial_url_atual').value = urlModPresencial;

                status.style.color = "green"; status.innerText = "Sucesso! O conteúdo foi atualizado.";
            } catch (error) {
                status.style.color = "red"; status.innerText = "Erro ao salvar: " + error.message;
            } finally { 
                btn.disabled = false;
                setTimeout(() => status.innerText = "", 5000); 
            }
        }

        async function salvarOuAtualizar(secao, chave, valor) {
            if (!valor) return;
            const { data } = await supabaseClient.from('conteudo_site').select('id').eq('secao', secao).eq('chave', chave).single();
            if (data) {
                await supabaseClient.from('conteudo_site').update({ valor: valor }).eq('id', data.id);
            } else {
                await supabaseClient.from('conteudo_site').insert([{ secao: secao, chave: chave, valor: valor }]);
            }
        }

        // Função Genérica para salvar estilos de qualquer aba
        async function salvarEstilos(event, secao, chaveBase) {
            if(event) event.preventDefault();
            const btn = event.target;
            const textoOriginal = btn.innerText;
            btn.innerText = "Salvando configurações...";
            
            const width = document.getElementById(chaveBase + '-width').value;
            const height = document.getElementById(chaveBase + '-height').value;
            const fit = document.getElementById(chaveBase + '-fit').value;
            const position = document.getElementById(chaveBase + '-position').value;

            try {
                await salvarOuAtualizar(secao, chaveBase + '_width', width);
                await salvarOuAtualizar(secao, chaveBase + '_height', height);
                await salvarOuAtualizar(secao, chaveBase + '_fit', fit);
                await salvarOuAtualizar(secao, chaveBase + '_position', position);
                alert("Tamanhos e posição salvos com sucesso!");
            } catch (erro) {
                console.error("Erro ao salvar estilos:", erro);
                alert("Erro ao salvar as configurações.");
            } finally {
                btn.innerText = textoOriginal;
            }
        }
    </script>
</body>
</html>
