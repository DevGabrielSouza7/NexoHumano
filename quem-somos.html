    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

    <!-- MENU DE NAVEGAÇÃO (Igual em todas as abas, mudando apenas a classe active) -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <img src="img/logo-nexo.png" alt="Nexo Logo"> 
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="quem-somos.html" class="active">Quem Somos</a></li>
                    <li><a href="servicos.html">Serviços</a></li>

            <div class="header-cta">

            </div>
        </div>

            <div class="team-container">
                
                <div class="team-header">
                    <h2>Conheça quem vai te atender</h2>
                    <!-- O ícone da flor de lótus que aparece no modelo pode entrar aqui depois como imagem -->
                    <div class="lotus-icon"></div> 
                </div>

                <!-- Grid de Profissionais -->
                <div class="team-grid">
                    
                    <!-- Profissional 1 -->
                    <div class="team-card">
                        <div class="profile-img-container">
                            <img src="img/adriana.jpg" alt="Adriana Santos" class="profile-placeholder">
                        </div>
                        <h3>Adriana Santos</h3>
                        <p class="crp">CRP: 19/5704</p>
                    </div>

                    <!-- Profissional 2 -->
                    <div class="team-card">
                        <div class="profile-img-container">
                            <img src="img/joselito.jpg" alt="Joselito Silva" class="profile-placeholder">
                        </div>
                        <h3>Joselito Silva</h3>
                        <p class="crp">CRP: 19/5704</p>
                    </div>

                    <!-- Profissional 3 -->
                    <div class="team-card">
                        <div class="profile-img-container">
                            <img src="img/suzana.jpg" alt="Suzana Melo" class="profile-placeholder">
                        </div>
                        <h3>Suzana Melo</h3>
                        <p class="crp">CRP: 19/5704</p>
                    </div>

                </div>

                <div class="team-action">
                    <a href="contato.html" class="btn-primary">Marque sua consulta</a>
